version: "3.9"

services:
  db:
    image: postgres:15
    container_name: insta_db
    environment:
      POSTGRES_USER: insta
      POSTGRES_PASSWORD: insta
      POSTGRES_DB: insta_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: insta_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: insta_rabbitmq
    ports:
      - "15672:15672"
      - "5672:5672"

volumes:
  pgdata: